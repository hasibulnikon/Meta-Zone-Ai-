name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow customtkinter tkinterdnd2

      - name: Install ExifTool
        shell: pwsh
        run: |
          choco install exiftool -y --no-progress
          $et = (Get-Command exiftool.exe -ErrorAction SilentlyContinue)?.Source
          if (-not $et) { $et = "C:\ProgramData\chocolatey\bin\exiftool.exe" }
          New-Item -ItemType Directory -Force -Path "C:\ExifTool" | Out-Null
          Copy-Item $et "C:\ExifTool\exiftool.exe" -Force
          Write-Host "ExifTool: $((Get-Item 'C:\ExifTool\exiftool.exe').Length) bytes"

      - name: Get tkinterdnd2 bundle path
        id: tkdnd
        shell: pwsh
        run: |
          $path = python -c "import tkinterdnd2, os; print(os.path.dirname(tkinterdnd2.__file__))"
          echo "path=$path" >> $env:GITHUB_OUTPUT
          Write-Host "tkinterdnd2 at: $path"

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          $icon_arg = ""
          if (Test-Path "icon.ico") { $icon_arg = "--icon=icon.ico" }
          elseif (Test-Path "icon.png") { $icon_arg = "--icon=icon.png" }

          $tkdnd_path = "${{ steps.tkdnd.outputs.path }}"

          $pyinstaller_args = @(
            "--onefile",
            "--windowed",
            "--name=MetaZone",
            "--add-data=C:\ExifTool\exiftool.exe;exiftool_pkg",
            "--add-data=${tkdnd_path};tkinterdnd2",
            "--hidden-import=tkinterdnd2",
            "--hidden-import=tkinterdnd2.TkinterDnD",
            "--collect-all=tkinterdnd2",
            "--hidden-import=PIL._tkinter_finder"
          )

          if ($icon_arg) { $pyinstaller_args += $icon_arg }
          if (Test-Path "icon.png") { $pyinstaller_args += "--add-data=icon.png;." }

          $pyinstaller_args += "metadata_tool.py"

          Write-Host "pyinstaller $($pyinstaller_args -join ' ')"
          & python -m PyInstaller @pyinstaller_args

      - name: Verify EXE was created
        shell: pwsh
        run: |
          if (Test-Path "dist\MetaZone.exe") {
            Write-Host "SUCCESS: $((Get-Item 'dist\MetaZone.exe').Length / 1MB) MB"
          } else {
            Write-Error "MetaZone.exe not found!"; exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetaZone-Windows
          path: dist\MetaZone.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3
          name: Meta Zone v1.3
          body: |
            ## Meta Zone v1.0 Beta

            ### ✨ Metadata AI Tab
            - Generate title, description & keywords from images using AI
            - Providers: Gemini (free) · OpenRouter (free) · Mistral · Groq · OpenAI · Claude
            - Prompt generation mode for AI image prompts
            - Drag & drop support for bulk import
            - Paginated queue — handles 1000+ files without freezing
            - Single-word keyword mode
            - Per-card model badge showing which API key was used
            - Inline character / keyword counters on every field

            ### 📋 Embed Metadata Tab
            - Batch embed CSV metadata into JPEG/PNG/EPS/AI/MP4/MOV
            - Match Filename Only toggle · Sub-folder search
            - Remove software/program name from EXIF
            - Activity log with timestamps

            ### How to use
            1. Download **MetaZone.exe** — double-click, no install needed
            2. Open **API Configuration**, add your API key(s)
            3. Drop images onto the upload zone (or click to browse)
            4. Click **Generate Batch**
            5. Download CSV, or switch to **Embed** tab to write metadata into files
          files: dist\MetaZone.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
